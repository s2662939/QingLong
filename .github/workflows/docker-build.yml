name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/a009-qinglong

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Dockerfile
        run: |
          echo "=== Dockerfile Content ==="
          cat Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Pull base image first
        run: |
          echo "=== Pulling base image ==="
          docker pull whyour/qinglong:latest || echo "Pull failed, trying build anyway"

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          load: true
          cache-from: type=local,src=/tmp/buildx-cache
          cache-to: type=local,dest=/tmp/buildx-cache-new,mode=max

      - name: Test image
        if: success()
        run: |
          echo "=== Testing image ==="
          docker run --rm ${{ steps.meta.outputs.tags }} python3 --version
          docker run --rm ${{ steps.meta.outputs.tags }} bash -c \
            "python3 -c 'import psutil; print(\"psutil OK\")'"
          docker run --rm ${{ steps.meta.outputs.tags }} bash -c \
            "python3 -c 'import PIL; print(\"Pillow OK\")'"

      - name: Push to GHCR
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Cache cleanup
        if: always()
        run: |
          rm -rf /tmp/buildx-cache /tmp/buildx-cache-new

  security-scan:
    needs: build-and-push
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          exit-code: '0'
